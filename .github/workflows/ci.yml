name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: SQLX_OFFLINE=true cargo test

      - name: Build release
        run: SQLX_OFFLINE=true cargo build --release -p tsx

      - name: Check binary size
        shell: bash
        run: |
          size=$(stat -c%s target/release/tsx || stat -f%z target/release/tsx)
          echo "Binary size: $size bytes"
          if [ "$size" -gt 10485760 ]; then
            echo "Error: Binary size exceeds 10MB limit"
            exit 1
          fi

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
