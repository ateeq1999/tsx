name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: tsx-x86_64-pc-windows-msvc
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: tsx-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: tsx-aarch64-unknown-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: tsx-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: tsx-aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add cross compile targets
        run: rustup target add ${{ matrix.target }}

      - name: Build release
        uses: houseabsolute/actions-rust-cross@v0.1.0
        with:
          targets: ${{ matrix.target }}
          args: --release --strip

      - name: Package binary
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/tsx.exe release/${{ matrix.artifact_name }}.exe || \
          cp target/${{ matrix.target }}/release/tsx release/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}*

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
