name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Rust ──────────────────────────────────────────────────────────────────

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release -p tsx

      - name: Check binary size
        shell: bash
        run: |
          size=$(stat -c%s target/release/tsx || stat -f%z target/release/tsx)
          echo "Binary size: $size bytes"
          if [ "$size" -gt 10485760 ]; then
            echo "Error: Binary size exceeds 10MB limit"
            exit 1
          fi

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Web (shared install) ──────────────────────────────────────────────────

  web:
    name: Web Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Single install at workspace root — resolves all packages/* and apps/*
      - name: Install workspace dependencies
        run: bun install

      - name: Build registry-web
        working-directory: apps/registry-web
        run: bun run build

      - name: Build docs
        working-directory: apps/docs
        run: bun run build

      # Cache workspace node_modules for downstream jobs
      - name: Upload node_modules cache
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/registry-web/node_modules
            apps/docs/node_modules
            packages/ui/node_modules
            packages/api-types/node_modules
          key: bun-ws-${{ runner.os }}-${{ hashFiles('bun.lockb', '*/*/package.json') }}

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/registry-web/node_modules
            apps/docs/node_modules
            packages/ui/node_modules
            packages/api-types/node_modules
          key: bun-ws-${{ runner.os }}-${{ hashFiles('bun.lockb', '*/*/package.json') }}
          restore-keys: bun-ws-${{ runner.os }}-

      - name: Install Playwright browsers
        working-directory: apps/registry-web
        run: bunx playwright install --with-deps chromium

      - name: Build app
        working-directory: apps/registry-web
        run: bun run build
        env:
          DATABASE_URL: "postgresql://postgres:@localhost:5432/tsx_db"
          VITE_REGISTRY_URL: "http://localhost:8080"

      - name: Run E2E tests
        working-directory: apps/registry-web
        run: bun run test:e2e
        env:
          BASE_URL: "http://localhost:3000"
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/registry-web/playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/registry-web/node_modules
            apps/docs/node_modules
            packages/ui/node_modules
            packages/api-types/node_modules
          key: bun-ws-${{ runner.os }}-${{ hashFiles('bun.lockb', '*/*/package.json') }}
          restore-keys: bun-ws-${{ runner.os }}-

      - name: Build app
        working-directory: apps/registry-web
        run: bun run build
        env:
          DATABASE_URL: "postgresql://postgres:@localhost:5432/tsx_db"
          VITE_REGISTRY_URL: "http://localhost:8080"

      - name: Run Lighthouse CI
        working-directory: apps/registry-web
        run: bunx @lhci/cli autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  storybook:
    name: Storybook
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore workspace cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/registry-web/node_modules
            apps/docs/node_modules
            packages/ui/node_modules
            packages/api-types/node_modules
          key: bun-ws-${{ runner.os }}-${{ hashFiles('bun.lockb', '*/*/package.json') }}
          restore-keys: bun-ws-${{ runner.os }}-

      - name: Build Storybook
        working-directory: apps/registry-web
        run: bun run build-storybook
