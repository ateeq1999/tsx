name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  SQLX_OFFLINE: "true"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --workspace

      - name: Build release (tsx CLI)
        run: cargo build --release -p tsx

      - name: Check binary size
        shell: bash
        run: |
          size=$(stat -c%s target/release/tsx || stat -f%z target/release/tsx)
          echo "Binary size: $size bytes ($(( size / 1024 / 1024 )) MB)"
          if [ "$size" -gt 15728640 ]; then
            echo "Error: Binary size exceeds 15 MB limit"
            exit 1
          fi

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
