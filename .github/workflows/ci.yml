name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Check binary size
        shell: bash
        run: |
          size=$(stat -c%s target/release/tsx || stat -f%z target/release/tsx)
          echo "Binary size: $size bytes"
          if [ "$size" -gt 10485760 ]; then
            echo "Error: Binary size exceeds 10MB limit"
            exit 1
          fi

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  web:
    name: Web Apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install registry-web dependencies
        working-directory: apps/registry-web
        run: bun install

      - name: Build registry-web
        working-directory: apps/registry-web
        run: bun run build

      - name: Install docs dependencies
        working-directory: apps/docs
        run: bun install

      - name: Build docs
        working-directory: apps/docs
        run: bun run build
