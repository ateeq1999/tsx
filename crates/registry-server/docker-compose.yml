services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tsx
      POSTGRES_PASSWORD: tsx
      POSTGRES_DB: tsx_registry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsx"]
      interval: 5s
      timeout: 5s
      retries: 5

  registry:
    build:
      context: ../..
      dockerfile: crates/registry-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://tsx:tsx@postgres:5432/tsx_registry
      PORT: 8080
      DATA_DIR: /data
    volumes:
      - registry_data:/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  registry_data:
